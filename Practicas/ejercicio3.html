<!--  
Realiza una petición AJAX usando fetch() a:
https://jsonplaceholder.typicode.com/posts
Y:
Muestra solo los primeros 10 títulos
Cada título debe ser un <li>
Añade un botón “Recargar” que repita la petición
-->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 3</title>
</head>
<body>
    <h1>Posts</h1>

    <button id="reload">Recargar</button>
    <ul id="posts"></ul>

    <script>
        // TU CÓDIGO AQUÍ
    document.addEventListener("DOMContentLoaded", function() {
        const lista = document.getElementById("posts");
        const reload = document.getElementById("reload");

        reload.addEventListener("click",  async function() {
            try {
                const response = await fetch("https://jsonplaceholder.typicode.com/posts");
                const data = await response.json();
                lista.innerHTML = "";
                
                for(let i = 0; i < 10; i++) {
                    lista.innerHTML += `<li>${data[i].title}</li>`;
                }
            } catch (error) {
                lista.innerHTML = "<li>Error al cargar</li>"; 
            }
        });
    });
    </script>

</body>
</html>
