<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuario aleatorio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Información de una persona aleatoria</h1>
        <div id="user-card" class="card">
            <img id="user-imagen" src="" alt="Foto del usuario">
            <h2 id="user-nombre"></h2>
            <p id="user-mail"></p>
            <p id="user-direccion"></p>
            <p id="user-estado"></p>
        </div>
    </div>
    <p class="note">Recarga la página para ver otro usuario aleatorio</p>
    <script src="script.js"></script>
</body>
</html>
