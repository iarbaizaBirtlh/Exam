<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
</head>
<body>
    <h1>Claculadora de IMC</h1>
    <form>
        <label for="altura">Estatura (en metros):</label>
        <input type="text" name="altura" id="altura"><br><br>
        <label for="peso">Peso (en kg):</label>
        <input type="text" name="peso" id="peso"><br><br>
        <button type="button" onclick="calcularIMC()">Calcular IMC</button>
    </form>
    <p id="resultado"></p>

    <script src="main.js"></script>
</body>
</html>
